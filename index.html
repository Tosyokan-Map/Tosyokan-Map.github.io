    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.2rem; margin: 5px 0; text-align: center; }

        /* 検索ボタン */
        .search-toggle-btn {
            background-color: #000000; color: #ffffff; border: none;
            padding: 12px 20px; font-size: 1rem; font-weight: bold;
            border-radius: 4px; cursor: pointer; margin-bottom: 10px;
            width: 100%; max-width: 900px; text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* アコーディオン（検索パネル） */
        .search-panel {
            max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
            width: 100%; max-width: 900px; background-color: #f9f9f9;
            border-radius: 4px; margin-bottom: 10px;
        }
        .search-panel.open {
            max-height: 500px; overflow-y: auto; border: 1px solid #dddddd; padding-bottom: 10px;
        }

        .genre-title {
            font-size: 0.9rem; font-weight: bold; border-left: 3px solid #000;
            padding-left: 6px; margin: 15px 10px 5px 10px; color: #333;
        }
        .button-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 6px; padding: 0 10px;
        }

        .nav-button {
            background-color: #fff; color: #000; border: 1px solid #ccc;
            padding: 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .nav-button.active { background-color: #000; color: #fff; border-color: #000; }

        /* マップのコンテナ */
        .map-container {
            background-color: #fff; border: 2px solid #000; padding: 10px;
            width: 100%; max-width: 900px; box-sizing: border-box; position: relative;
        }
        svg { width: 100%; height: auto; display: block; }

        /* SVGデザイン */
        .outline { fill: none; stroke: #000; stroke-width: 2; }
        .thin-line { fill: none; stroke: #000; stroke-width: 1; }
        .dashed-line { fill: none; stroke: #000; stroke-width: 1; stroke-dasharray: 4,4; }
        .bg-gray { fill: #f0f0f0; stroke: #000; stroke-width: 1; transition: fill 0.3s; }
        .bg-white { fill: #fff; stroke: #000; stroke-width: 1; transition: fill 0.3s; }
        
        .txt { fill: #000; font-family: sans-serif; text-anchor: middle; dominant-baseline: central; font-size: 13px; }
        .txt-sm { fill: #000; font-family: sans-serif; text-anchor: middle; dominant-baseline: central; font-size: 11px; }
        .txt-lg { fill: #000; font-family: sans-serif; text-anchor: middle; dominant-baseline: central; font-size: 16px; font-weight: bold; }
        
        /* 縦書き文字用 */
        .vert-txt { writing-mode: vertical-rl; text-anchor: middle; font-family: sans-serif; font-size: 13px; }
        .vert-txt-lg { writing-mode: vertical-rl; text-anchor: middle; font-family: sans-serif; font-size: 18px; font-weight: bold; }

        /* ターゲット発光エフェクト */
        .target-glow {
            fill: #000000 !important; stroke: #000000 !important;
            animation: pulseBg 0.8s infinite alternate;
        }
        /* 黒い背景の上でも、白い背景の上でも見えるように、白フチ付きの文字にする */
        .target-text-glow {
            fill: #000000 !important; font-weight: bold !important;
            stroke: #ffffff; stroke-width: 3px; paint-order: stroke fill;
        }
        @keyframes pulseBg {
            from { filter: drop-shadow(0 0 2px #000); opacity: 1; }
            to { filter: drop-shadow(0 0 10px #000); opacity: 0.5; }
        }
    </style>
</head>

    <script>
	
        function toggleSearchPanel() {
            var panel = document.getElementById('search-panel');
            var icon = document.getElementById('toggle-icon');
            var text = document.getElementById('toggle-text');
            
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
                icon.textContent = '🔍';
                text.textContent = '探したい本のジャンルを選択する';
            } else {
                panel.classList.add('open');
                icon.textContent = '❌';
                text.textContent = '検索メニューを閉じる';
            }
        }


        function selectRoute(targetId) {
            // 1. 全てのボタンの色を元に戻す
            var allButtons = document.querySelectorAll('.nav-button');
            for (var j = 0; j < allButtons.length; j++) {
                allButtons[j].classList.remove('active');
            }

            // 2. 以前光っていた本棚と文字の光を消す
            var allGlows = document.querySelectorAll('.target-glow');
            for (var k = 0; k < allGlows.length; k++) {
                allGlows[k].classList.remove('target-glow');
            }
            var allTextGlows = document.querySelectorAll('.target-text-glow');
            for (var l = 0; l < allTextGlows.length; l++) {
                allTextGlows[l].classList.remove('target-text-glow');
            }

            // 3. 目的地の本棚/設備を黒く反転して光らせる
            var targetGeo = document.getElementById('geo-' + targetId);
            if (targetGeo) {
                if (targetGeo.tagName.toLowerCase() === 'g') {
                    // グループ(閲覧席など)の場合は中の四角形を全て光らせる
                    var rects = targetGeo.querySelectorAll('rect');
                    for (var m = 0; m < rects.length; m++) {
                        rects[m].classList.add('target-glow');
                    }
                } else {
                    targetGeo.classList.add('target-glow');
                }
            }

            // 4. 目的地の文字を光らせる
            var targetTexts = document.querySelectorAll('text[data-txt="' + targetId + '"]');
            for (var n = 0; n < targetTexts.length; n++) {
                targetTexts[n].classList.add('target-text-glow');
            }

            // 5. クリックしたボタンを黒くする
            var clickedButton = document.querySelector('button[data-target="' + targetId + '"]');
            if (clickedButton) {
                clickedButton.classList.add('active');
            }

            // 6. 画面を見やすくするため、0.3秒後に自動でメニューを閉じる
            setTimeout(function() {
                var panel = document.getElementById('search-panel');
                if (panel.classList.contains('open')) {
                    toggleSearchPanel();
                }
            }, 300);
        }
    </script>
